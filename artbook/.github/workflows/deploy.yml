name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le projet
        uses: actions/checkout@v6

      - name: Installer Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Installer les dependances
        run: |
          cd artbook
          npm ci

      - name: Construire le site
        run: |
          cd artbook
          npm run build

      - name: Preparer GitHub Pages
        run: |
          cd artbook
          touch dist/.nojekyll
          cp dist/index.html dist/404.html

      - name: Configurer Pages
        uses: actions/configure-pages@v6

      - name: Envoyer le site construit
        uses: actions/upload-pages-artifact@v5
        with:
          path: artbook/dist

      - name: Publier sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
